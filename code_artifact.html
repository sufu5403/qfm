            const now = new Date();
            const endOfDay = new Date();
            endOfDay.setHours(23, 59, 59, 999);
            const diff = endOfDay - now;
            const h = Math.floor(diff / 3600000);
            const m = Math.floor((diff % 3600000) / 60000);
            const s = Math.floor((diff % 60000) / 1000);
            dailyTimerEl.innerText = `倒數 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        }

        function updateSchedule() {
            // 前進一天的固定顯示
            const scheduleData = [
                { lecture: "歷史 B2 第3單元", test: "國文 第2回、歷史 第2回" },
                { lecture: "國文 B2 第3～4單元、英文 B2 L1～L5", test: "無" },
                { lecture: "地理 B1 第3單元", test: "無" },
                { lecture: "生物 B1 第3單元", test: "數學 第3回、地理 第2回" }
            ];
            document.getElementById('today-content').innerHTML = `講義：${scheduleData[1].lecture}<br>測驗：${scheduleData[1].test}`;
            document.getElementById('tomorrow-content').innerHTML = `講義：${scheduleData[2].lecture}<br>測驗：${scheduleData[2].test}`;
        }

        function rotateQuote() {
            const randomIdx = Math.floor(Math.random() * quotes.length);
            msgEl.innerText = quotes[randomIdx];
        }

        function updateTimer() {
            const now = new Date().getTime();
            const diff = targetDate - now;
            if (diff <= 0) { timerEl.innerHTML = "考試開始！"; return; }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);
            const ms = Math.floor((diff % 1000) / 10);
            timerEl.innerHTML = `${days}天 ${String(hours).padStart(2, '0')}:${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}.${String(ms).padStart(2, '0')}`;
        }

        updateSchedule();
        updateTimer();
        updateDailyTimer();
        setInterval(updateTimer, 30);
        setInterval(updateDailyTimer, 1000);
        setInterval(rotateQuote, 15000); // 每15秒更新一次語錄
    </script>
</body>
</html>
